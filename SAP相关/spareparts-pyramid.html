<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>备品备件物料化 · 倒金字塔层级结构图</title>
<style>
/* ============================================================
   备品备件物料化 · 倒金字塔层级结构图
   白底 · 三层倒金字塔 · 物料化地基为核心
   ============================================================ */

:root {
  --navy:      #1E3A5F;
  --orange:    #E8830C;
  --orange-bg: #FFF7ED;
  --green:     #0F766E;
  --green-bg:  #ECFDF5;
  --red:       #DC2626;
  --red-bg:    #FEF2F2;
  --gold:      #F59E0B;
  --gold-bg:   #FEF9E7;
  --white:     #FFFFFF;
  --dark:      #1E293B;
  --gray:      #64748B;
  --border:    #E2E8F0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #F1F5F9;
  font-family: "PingFang SC","Microsoft YaHei","HarmonyOS Sans SC",system-ui,-apple-system,sans-serif;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 40px;
}

.canvas {
  background: var(--white);
  width: 1400px;
  min-height: 900px;
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 56px 64px 48px;
  position: relative;
}

/* 标题区 */
.title-area {
  text-align: center; margin-bottom: 44px;
}
.title-area h1 {
  font-size: 26px; font-weight: 700; color: var(--dark); letter-spacing: 1px;
}
.title-area .sub {
  font-size: 13px; color: var(--gray); margin-top: 6px; letter-spacing: .5px;
}

/* 主结构区 */
.main-area {
  position: relative;
  max-width: 1100px; margin: 0 auto;
  min-height: 660px;
}

/* ========== 第一层（地基）：深蓝色横向长条 ========== */
.layer-foundation {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--navy);
  border-radius: 8px;
  padding: 32px 40px;
  color: #fff;
  z-index: 1;
}
.layer-foundation .l1-title {
  font-size: 22px; font-weight: 700; letter-spacing: 1.5px;
  margin-bottom: 6px;
}
.layer-foundation .l1-sub {
  font-size: 13px; color: rgba(255,255,255,.75); letter-spacing: .5px;
}

/* ========== 第二层（中间层）：四个橙色方块 ========== */
.layer-middle {
  position: absolute;
  bottom: 148px;
  left: 20px; right: 20px;
  display: flex; gap: 18px; justify-content: center;
  z-index: 2;
}
.block-orange {
  flex: 1; max-width: 198px;
  background: var(--orange-bg);
  border: 2px solid var(--orange);
  border-radius: 8px;
  padding: 18px 12px;
  text-align: center;
  font-size: 14px; font-weight: 700; color: var(--orange);
  letter-spacing: .8px;
  position: relative;
}

/* 四个橙色方块下方箭头 → 指向地基 */
.block-orange::after {
  content: '';
  position: absolute; bottom: -42px; left: 50%;
  width: 2px; height: 38px; background: var(--orange);
  transform: translateX(-50%);
}
.block-orange::before {
  content: '';
  position: absolute; bottom: -50px; left: 50%;
  width: 0; height: 0;
  border-left: 9px solid transparent;
  border-right: 9px solid transparent;
  border-top: 12px solid var(--orange);
  transform: translateX(-50%);
}

/* "依赖地基" 标签 */
.block-orange .dep-label {
  position: absolute; bottom: -70px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px; color: var(--gray); white-space: nowrap;
  letter-spacing: .5px;
}

/* ========== 顶层：绿色箭头 + 金色奖牌 ========== */
.layer-top {
  position: absolute;
  bottom: 342px;
  left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center;
  z-index: 3;
}

/* 绿色大箭头 */
.green-arrow {
  position: relative;
  width: 60px; height: 110px;
  background: var(--green);
  border-radius: 8px 8px 0 0;
}
.green-arrow::after {
  content: '';
  position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 40px solid transparent;
  border-right: 40px solid transparent;
  border-top: 36px solid var(--green);
}
/* 箭头中间白色竖线 */
.green-arrow-inner {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  width: 6px; height: 40px; background: rgba(255,255,255,.35); border-radius: 3px;
}

/* 绿色向上的粗箭头（从四个橙色方块聚合到奖牌） */
.arrow-up-bundle {
  display: flex; gap: 3px; margin-top: 6px;
}
.arrow-up-bundle .arrow-line {
  width: 8px; height: 18px; background: var(--green); border-radius: 2px;
  opacity: .6;
}

/* 金色奖牌 */
.medal {
  margin-top: -10px;
  width: 320px;
  background: linear-gradient(135deg, var(--gold-bg) 0%, #FFFBEB 50%, var(--gold-bg) 100%);
  border: 2.5px solid var(--gold);
  border-radius: 12px;
  padding: 18px 24px;
  text-align: center;
  position: relative;
}
.medal::before {
  content: '🏆';
  position: absolute; top: -22px; left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
}
.medal .medal-text {
  font-size: 17px; font-weight: 700; color: #92400E;
  letter-spacing: .8px; line-height: 1.5;
}

/* 聚合箭头（从四个橙色方块到奖牌） */
.aggregate-arrows {
  position: absolute;
  bottom: 315px; left: 20px; right: 20px;
  height: 30px; z-index: 1;
}
.agg-line {
  position: absolute; bottom: 0;
  height: 2px; background: var(--green); opacity: .25;
}
.agg-line-l { left: 0; width: calc(50% - 52px); }
.agg-line-r { right: 0; width: calc(50% - 52px); }

/* ========== 右侧红色警示区 ========== */
.warning-box {
  position: absolute;
  right: 0; top: 110px;
  width: 240px;
  border: 2px dashed var(--red);
  border-radius: 8px;
  background: var(--red-bg);
  padding: 20px 16px;
  z-index: 5;
}
.warning-box .warn-icon {
  font-size: 22px; margin-bottom: 8px; text-align: center;
}
.warning-box .warn-title {
  font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 8px;
  text-align: center;
}
.warning-box .warn-item {
  font-size: 11.5px; color: #991B1B; line-height: 1.8;
  padding-left: 12px; position: relative;
}
.warning-box .warn-item::before {
  content: '✕'; position: absolute; left: 0; color: var(--red);
  font-size: 9px; font-weight: 700;
}

/* 左侧连接线：警示区 → 地基 */
.warning-connector {
  position: absolute;
  right: 240px; top: 280px;
  width: 0; height: 0; z-index: 4;
}

/* ========== 底部返回 ========== */
.back-link {
  position: absolute; bottom: 16px; left: 64px;
  font-size: 12px; color: var(--gray); letter-spacing: .5px;
}
.back-link a { color: var(--navy); font-weight: 600; text-decoration: none; }
.back-link a:hover { text-decoration: underline; }

</style>
</head>
<body>

<div class="canvas">

  <!-- 标题 -->
  <div class="title-area">
    <h1>备品备件物料化 · 倒金字塔层级结构图</h1>
    <div class="sub">从物料地基到库存运营的逐层支撑体系</div>
  </div>

  <!-- 主区域 -->
  <div class="main-area">

    <!-- ===== 第一层：地基 ===== -->
    <div class="layer-foundation">
      <div class="l1-title">第一层（地基）：备品备件物料化</div>
      <div class="l1-sub">统一编码、绑定财务品类、录入价格/厂家/质检信息</div>
    </div>

    <!-- ===== 第二层：四个橙色方块 ===== -->
    <div class="layer-middle">
      <div class="block-orange">
        库存实时监控
        <div class="dep-label">依赖地基</div>
      </div>
      <div class="block-orange">
        采购申请跟踪
        <div class="dep-label">依赖地基</div>
      </div>
      <div class="block-orange">
        领用退库管理
        <div class="dep-label">依赖地基</div>
      </div>
      <div class="block-orange">
        智能预警分析
        <div class="dep-label">依赖地基</div>
      </div>
    </div>

    <!-- ===== 顶层：绿色箭头 + 金色奖牌 ===== -->
    <div class="layer-top">
      <div class="green-arrow">
        <div class="green-arrow-inner"></div>
      </div>
      <div class="medal">
        <div class="medal-text">账实相符率 99%<br>周转率提升 15%~20%</div>
      </div>
    </div>

    <!-- ===== 右侧红色警示区 ===== -->
    <div class="warning-box">
      <div class="warn-icon">⚠</div>
      <div class="warn-title">若不做物料化</div>
      <div class="warn-item">编码与财务脱节</div>
      <div class="warn-item">领用无据可查</div>
      <div class="warn-item">预警形同虚设</div>
    </div>

  </div>

  <!-- 底部返回 -->
  <div class="back-link">
    <a href="index.html">← 返回 SAP相关</a>
  </div>

</div>

</body>
</html>
