<svg viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg" class="svg-chart">
  <!-- 大周期 日线上涨 (上, 红) -->
  <text x="10" y="14" font-size="10" fill="var(--up)">日线 上涨</text>
  <polyline points="14,40 50,30 86,22 122,16 158,12" fill="none" stroke="var(--up)" stroke-width="2"/>
  <g stroke-width="2">
    <rect x="14" y="38" width="9" height="6" fill="var(--up)" stroke="var(--up)"/>
    <rect x="50" y="28" width="9" height="6" fill="var(--up)" stroke="var(--up)"/>
    <rect x="86" y="20" width="9" height="6" fill="var(--up)" stroke="var(--up)"/>
    <rect x="122" y="14" width="9" height="6" fill="var(--up)" stroke="var(--up)"/>
  </g>
  <!-- 小周期 15分钟回调 (下, 绿) -->
  <text x="10" y="68" font-size="10" fill="var(--down)">15分钟 回调</text>
  <polyline points="14,108 44,100 74,94 104,90 134,92 164,98" fill="none" stroke="var(--down)" stroke-width="2"/>
  <g stroke-width="2">
    <rect x="14" y="106" width="9" height="6" fill="var(--down)" stroke="var(--down)"/>
    <rect x="44" y="98" width="9" height="6" fill="var(--down)" stroke="var(--down)"/>
    <rect x="74" y="92" width="9" height="6" fill="var(--down)" stroke="var(--down)"/>
    <rect x="104" y="88" width="9" height="6" fill="var(--down)" stroke="var(--down)"/>
    <rect x="134" y="90" width="9" height="6" fill="var(--down)" stroke="var(--down)"/>
    <rect x="164" y="96" width="9" height="6" fill="var(--down)" stroke="var(--down)"/>
  </g>
  <text x="120" y="60" font-size="9" fill="var(--text)">大↑ / 小↓</text>
</svg>
