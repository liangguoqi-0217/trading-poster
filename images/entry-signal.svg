  <path d="M140,58 L140,44" stroke="var(--accent-blue)" stroke-width="2" marker-end="url(#arB)"/>
  <defs>
    <marker id="arB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="var(--accent-blue)" stroke-width="1.5"/>
    </marker>
  </defs>
  <text x="146" y="40" font-size="9" fill="var(--accent-blue)">突破买</text>
