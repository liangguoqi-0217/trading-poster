<svg viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg" class="svg-chart">
  <!-- 突破回调结构 -->
  <polyline points="14,96 40,82 66,68 92,58 110,68 124,76 140,66 156,52 172,40" fill="none" stroke="var(--up)" stroke-width="2"/>
  <g stroke-width="2">
    <rect x="14" y="92" width="6" height="9" fill="var(--up)" stroke="var(--up)"/>
    <rect x="40" y="78" width="6" height="9" fill="var(--up)" stroke="var(--up)"/>
    <rect x="66" y="64" width="6" height="9" fill="var(--up)" stroke="var(--up)"/>
    <rect x="92" y="54" width="6" height="9" fill="var(--up)" stroke="var(--up)"/>
    <rect x="110" y="64" width="6" height="9" fill="var(--down)" stroke="var(--down)"/>
    <rect x="124" y="72" width="6" height="9" fill="var(--down)" stroke="var(--down)"/>
    <rect x="140" y="62" width="6" height="9" fill="var(--up)" stroke="var(--up)"/>
    <rect x="156" y="48" width="6" height="9" fill="var(--up)" stroke="var(--up)"/>
    <rect x="172" y="36" width="6" height="9" fill="var(--up)" stroke="var(--up)"/>
