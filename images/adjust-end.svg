<svg viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg" class="svg-chart">
  <!-- 下跌调整 (绿) -->
  <polyline points="14,40 44,56 74,70 104,80" fill="none" stroke="var(--down)" stroke-width="2"/>
  <g stroke-width="2">
    <rect x="14" y="36" width="8" height="8" fill="var(--down)" stroke="var(--down)"/>
    <rect x="44" y="52" width="8" height="8" fill="var(--down)" stroke="var(--down)"/>
    <rect x="74" y="66" width="8" height="8" fill="var(--down)" stroke="var(--down)"/>
    <rect x="104" y="76" width="8" height="8" fill="var(--down)" stroke="var(--down)"/>
  </g>
  <!-- 末端减速 (横走) -->
  <polyline points="104,80 124,82 144,82 164,80" fill="none" stroke="var(--phase-yellow)" stroke-width="2" stroke-dasharray="4 3"/>
  <circle cx="104" cy="80" r="3.5" fill="var(--down)"/>
  <circle cx="164" cy="80" r="3.5" fill="var(--phase-yellow)"/>
  <!-- 止跌信号 (红向上箭头) -->
  <path d="M164,80 L168,64" stroke="var(--up)" stroke-width="2" marker-end="url(#arrowUp)"/>
  <defs>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="var(--up)" stroke-width="1.5"/>
    </marker>
  </defs>
  <text x="120" y="104" font-size="9" fill="var(--phase-yellow)">调整末端</text>
</svg>
