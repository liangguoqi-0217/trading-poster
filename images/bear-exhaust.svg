<svg viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg" class="svg-chart">
  <!-- 空头衰竭: 阴线逐渐缩短 -->
  <text x="10" y="14" font-size="10" fill="var(--down)">空头衰竭</text>
  <g stroke-width="2">
    <rect x="14" y="40" width="8" height="22" fill="var(--down)" stroke="var(--down)"/>
    <line x1="18" y1="36" x2="18" y2="66" stroke="var(--down)"/>
    <rect x="34" y="48" width="8" height="18" fill="var(--down)" stroke="var(--down)"/>
    <line x1="38" y1="44" x2="38" y2="68" stroke="var(--down)"/>
    <rect x="54" y="54" width="8" height="14" fill="var(--down)" stroke="var(--down)"/>
    <line x1="58" y1="51" x2="58" y2="70" stroke="var(--down)"/>
    <rect x="74" y="58" width="8" height="11" fill="var(--down)" stroke="var(--down)"/>
    <line x1="78" y1="56" x2="78" y2="72" stroke="var(--down)"/>
    <rect x="94" y="62" width="8" height="8" fill="var(--down)" stroke="var(--down)"/>
    <line x1="98" y1="60" x2="98" y2="72" stroke="var(--down)"/>
  </g>
  <!-- 成交量柱 缩小 -->
  <g fill="var(--vol)">
    <rect x="16" y="96" width="6" height="16"/>
    <rect x="36" y="100" width="6" height="12"/>
    <rect x="56" y="104" width="6" height="8"/>
    <rect x="76" y="106" width="6" height="6"/>
    <rect x="96" y="108" width="6" height="4"/>
  </g>
  <text x="112" y="60" font-size="9" fill="var(--text)">阴线↓</text>
  <text x="112" y="100" font-size="9" fill="var(--text)">量↓</text>
</svg>
