<svg viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg" class="svg-chart">
  <!-- 平台区间 -->
  <line x1="14" y1="78" x2="100" y2="78" stroke="var(--line-soft)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="14" y1="64" x2="100" y2="64" stroke="var(--line-soft)" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- 平台内整理 K线 (绿跌-中国习惯: 平台横盘用中性/绿) -->
  <g stroke-width="2">
    <rect x="16" y="70" width="6" height="8" fill="var(--down)" stroke="var(--down)"/>
    <line x1="19" y1="66" x2="19" y2="80" stroke="var(--down)"/>
    <rect x="27" y="68" width="6" height="7" fill="var(--down)" stroke="var(--down)"/>
    <line x1="30" y1="65" x2="30" y2="78" stroke="var(--down)"/>
    <rect x="38" y="71" width="6" height="6" fill="var(--down)" stroke="var(--down)"/>
    <line x1="41" y1="68" x2="41" y2="79" stroke="var(--down)"/>
    <rect x="49" y="69" width="6" height="8" fill="var(--down)" stroke="var(--down)"/>
    <line x1="52" y1="66" x2="52" y2="79" stroke="var(--down)"/>
    <rect x="60" y="72" width="6" height="6" fill="var(--down)" stroke="var(--down)"/>
    <line x1="63" y1="69" x2="63" y2="80" stroke="var(--down)"/>
    <rect x="71" y="70" width="6" height="7" fill="var(--down)" stroke="var(--down)"/>
    <line x1="74" y1="67" x2="74" y2="79" stroke="var(--down)"/>
    <rect x="82" y="73" width="6" height="6" fill="var(--down)" stroke="var(--down)"/>
    <line x1="85" y1="70" x2="85" y2="81" stroke="var(--down)"/>
    <rect x="93" y="71" width="6" height="7" fill="var(--down)" stroke="var(--down)"/>
    <line x1="96" y1="68" x2="96" y2="80" stroke="var(--down)"/>
  </g>
  <!-- 突破放量 (红涨) -->
  <g stroke-width="2">
    <rect x="104" y="60" width="6" height="14" fill="var(--up)" stroke="var(--up)"/>
    <line x1="107" y1="54" x2="107" y2="76" stroke="var(--up)"/>
    <rect x="115" y="50" width="6" height="16" fill="var(--up)" stroke="var(--up)"/>
    <line x1="118" y1="44" x2="118" y2="68" stroke="var(--up)"/>
    <rect x="126" y="40" width="6" height="16" fill="var(--up)" stroke="var(--up)"/>
    <line x1="129" y1="34" x2="129" y2="58" stroke="var(--up)"/>
    <rect x="137" y="30" width="6" height="16" fill="var(--up)" stroke="var(--up)"/>
    <line x1="140" y1="24" x2="140" y2="48" stroke="var(--up)"/>
    <rect x="148" y="22" width="6" height="14" fill="var(--up)" stroke="var(--up)"/>
    <line x1="151" y1="16" x2="151" y2="38" stroke="var(--up)"/>
    <rect x="159" y="16" width="6" height="14" fill="var(--up)" stroke="var(--up)"/>
    <line x1="162" y1="10" x2="162" y2="32" stroke="var(--up)"/>
  </g>
  <!-- 突破箭头 -->
  <path d="M100 56 L120 40" stroke="var(--accent-blue)" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="var(--accent-blue)" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>
